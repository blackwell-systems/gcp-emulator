name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  docker-publish:
    name: Build and publish unified image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: gcp-emulator

      - name: Checkout sibling repos
        run: |
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/blackwell-systems/gcp-iam-emulator
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/blackwell-systems/gcp-kms-emulator
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/blackwell-systems/gcp-secret-manager-emulator
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/blackwell-systems/gcp-eventarc-emulator

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-') }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: gcp-emulator/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
