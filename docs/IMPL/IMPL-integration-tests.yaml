pre_mortem:
    overall_risk: medium
    rows:
        - scenario: |
            REST gateway requires a real TCP address to dial gRPC, but direct gRPC
            tests use bufconn. The setupEmulator helper must provide both.
          likelihood: high
          impact: medium
          mitigation: |
            setupEmulator binds the gRPC server to both a bufconn listener (for
            direct gRPC tests) and a real TCP listener on localhost:0 (for the REST
            gateway). Both are returned. Agent A's prompt specifies this dual-listener
            pattern explicitly.
        - scenario: |
            Proto import paths may be wrong. Using cloud.google.com/go/secretmanager
            wrapper client vs raw proto stub secretmanagerpb.NewSecretManagerServiceClient.
          likelihood: medium
          impact: low
          mitigation: |
            Agent prompts specify exact import paths using raw gRPC proto stubs, not
            the higher-level cloud.google.com/go client wrappers, since tests dial
            via bufconn using raw grpc.ClientConn.
        - scenario: |
            Environment variable conflicts (IAM_MODE, IAM_EMULATOR_HOST) if tests
            run in parallel with t.Parallel().
          likelihood: medium
          impact: medium
          mitigation: |
            All agent prompts explicitly say do NOT use t.Parallel(). setupEmulator
            sets IAM_MODE=off as a safe default.
        - scenario: |
            REST gateway path routing depends on substring matching. Incorrect test
            URLs route to wrong service, producing confusing failures.
          likelihood: medium
          impact: low
          mitigation: |
            Agent B prompt includes exact URL paths matching the routing logic in
            internal/gateway/gateway.go: /keyRings or /cryptoKeys -> KMS,
            /locations/ -> Eventarc, else -> SM.
        - scenario: |
            grpc.Server.Serve() can only be called once per listener. Trying to
            serve on both bufconn and TCP with the same server may fail.
          likelihood: medium
          impact: high
          mitigation: |
            If grpc.Server cannot serve two listeners simultaneously, the fallback
            is to skip bufconn entirely and use only a real TCP listener on
            localhost:0 for both gRPC and REST tests. Agent A should try dual-serve
            first, and fall back to TCP-only if it fails.
